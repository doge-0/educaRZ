<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenida - Fish-Math</title>
    <link rel="icon" type="image/svg+xml" href="img/marhlogo.jpg">
    <link rel="stylesheet" href="css/interfaz.css">
</head>
<body>
    <div class="contenedor-principal">
        <h1 class="titulo">¡Bienvenido!</h1>
        
        <div class="seccion-bienvenida">
            <div class="avatar-bienvenida">
                <img id="avatarImg" src="" alt="Avatar del usuario" class="avatar-img-grande">
            </div>
            <div class="mensaje-bienvenida">
                <h2 id="mensajeBienvenida"></h2>
            </div>
        </div>
        
        <div class="acciones-bienvenida">
            <button class="boton-entrar" onclick="continuar()">Continuar</button>
            <button class="boton-entrar boton-cuarto" onclick="irCuartoBasico()">4 Basico</button>
        </div>
    </div>

    <audio id="musica-fondo" src="sonidos/musica1.mp3" loop preload="auto"></audio>
    <button id="boton-musica" class="boton-musica" type="button" aria-label="Activar musica">
        <img src="img/Mart.gif" alt="">
    </button>
    
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const nombre = localStorage.getItem('nombreUsuario');
            const avatar = localStorage.getItem('avatarSeleccionado');
            
            if (!nombre || !avatar) {
                window.location.href = 'index.html';
                return;
            }
            
            const avatarMap = {
                avatar1: 'alce.png',
                avatar2: 'leon.png',
                avatar3: 'rana.png',
                avatar4: 'tigre.png'
            };
            
            document.getElementById('avatarImg').src = 'img/' + avatarMap[avatar];
            document.getElementById('mensajeBienvenida').textContent = `Bienvenido ${nombre}, ¿estás listo para aprender?`;

            const musica = document.getElementById('musica-fondo');
            const boton = document.getElementById('boton-musica');
            let activa = false;

            if (musica && boton) {
                boton.addEventListener('click', () => {
                    if (activa) {
                        musica.pause();
                        activa = false;
                        boton.setAttribute('aria-label', 'Activar musica');
                        return;
                    }

                    musica.play().then(() => {
                        activa = true;
                        boton.setAttribute('aria-label', 'Pausar musica');
                    }).catch(() => {});
                });
            }
        });
        
        function continuar() {
            window.location.href = 'aprende1.html';
        }

        function irCuartoBasico() {
            window.location.href = 'cuarto-basico.html';
        }
    </script>
</body>
</html>
