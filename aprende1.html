<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Aprende</title>
    <link rel="stylesheet" href="css/interfaz.css">
    <link rel="icon" type="image/svg+xml" href="img/marhlogo.jpg">
    <style>
        .menu-opciones {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .menu-opciones a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 62px;
            padding: 18px 22px;
            border-radius: 18px;
            background: linear-gradient(180deg, #50c878 0%, #24a55a 100%);
            color: white;
            text-decoration: none;
            font-weight: 700;
            text-align: center;
            box-shadow: 0 8px 0 #178545, 0 14px 24px rgba(0, 45, 70, 0.18);
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }
        .menu-opciones a:hover:not(.bloqueado) {
            transform: translateY(-3px);
            box-shadow: 0 10px 0 #178545, 0 18px 30px rgba(0, 45, 70, 0.22);
        }
        .menu-opciones a:nth-child(2) {
            background: linear-gradient(180deg, #55b7ff 0%, #2c75e5 100%);
            box-shadow: 0 8px 0 #245cb7, 0 14px 24px rgba(0, 45, 70, 0.18);
        }
        .menu-opciones a:nth-child(2):hover:not(.bloqueado) {
            box-shadow: 0 10px 0 #245cb7, 0 18px 30px rgba(0, 45, 70, 0.22);
        }
        .menu-opciones a:nth-child(3) {
            background: linear-gradient(180deg, #ffbe55 0%, #ff812e 100%);
            box-shadow: 0 8px 0 #cc611f, 0 14px 24px rgba(0, 45, 70, 0.18);
        }
        .menu-opciones a:nth-child(3):hover:not(.bloqueado) {
            box-shadow: 0 10px 0 #cc611f, 0 18px 30px rgba(0, 45, 70, 0.22);
        }
        .menu-opciones a:nth-child(4) {
            background: linear-gradient(180deg, #ff7e73 0%, #e84a5f 100%);
            box-shadow: 0 8px 0 #ba3547, 0 14px 24px rgba(0, 45, 70, 0.18);
        }
        .menu-opciones a:nth-child(4):hover:not(.bloqueado) {
            box-shadow: 0 10px 0 #ba3547, 0 18px 30px rgba(0, 45, 70, 0.22);
        }
        .menu-opciones a.bloqueado {
            background: linear-gradient(180deg, #9ca9b3 0%, #6c7882 100%);
            box-shadow: 0 8px 0 #53606a, 0 12px 22px rgba(0, 45, 70, 0.12);
            cursor: not-allowed;
            opacity: 0.6;
            pointer-events: none;
        }
        .candado {
            font-size: 1.2em;
        }
        .pagina-contenedor {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
            width: 100%;
            max-width: 1120px;
        }
        .imagen-catfish {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-width: 230px;
            padding: 16px;
            background:
                radial-gradient(circle at 50% 42%, rgba(177, 239, 255, 0.9), rgba(255, 255, 255, 0.92) 58%),
                rgba(255, 255, 255, 0.95);
            border: 3px solid rgba(24, 141, 211, 0.35);
            border-radius: 28px;
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.18);
            overflow: visible;
        }
        .imagen-catfish::before,
        .imagen-catfish::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.55);
            pointer-events: none;
            animation: burbujasCatfish 4.6s ease-in-out infinite;
        }
        .imagen-catfish::before {
            width: 16px;
            height: 16px;
            left: 28px;
            bottom: 28px;
        }
        .imagen-catfish::after {
            width: 10px;
            height: 10px;
            right: 34px;
            bottom: 48px;
            animation-delay: 1.2s;
        }
        .contenedor-principal {
            max-width: 540px;
            width: 100%;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.38);
            backdrop-filter: blur(16px);
            box-shadow: 0 24px 58px rgba(0, 45, 70, 0.28);
        }
        .catfish-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            cursor: pointer;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 14px 18px rgba(0, 45, 70, 0.2));
            transform-origin: 50% 58%;
            animation: nadar 4.2s ease-in-out infinite;
            transition: transform 0.2s ease, filter 0.2s ease;
        }
        .catfish-img:hover {
            filter: drop-shadow(0 18px 24px rgba(0, 45, 70, 0.28));
        }
        .catfish-img.hablando {
            animation: hablarCatfish 0.65s ease-in-out infinite;
        }
        @keyframes nadar {
            0% {
                transform: translate3d(-4px, 0, 0) rotate(-2deg) scale(1);
            }
            35% {
                transform: translate3d(8px, -8px, 0) rotate(4deg) scale(1.04);
            }
            70% {
                transform: translate3d(-2px, 5px, 0) rotate(-3deg) scale(1.02);
            }
            100% {
                transform: translate3d(-4px, 0, 0) rotate(-2deg) scale(1);
            }
        }
        @keyframes hablarCatfish {
            0%, 100% {
                transform: translate3d(0, 0, 0) rotate(-2deg) scale(1.03);
            }
            50% {
                transform: translate3d(0, -7px, 0) rotate(3deg) scale(1.1);
            }
        }
        @keyframes burbujasCatfish {
            0% {
                transform: translateY(0) scale(0.8);
                opacity: 0;
            }
            20% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-86px) scale(1.3);
                opacity: 0;
            }
        }
        .burbuja-catfish {
            position: absolute;
            top: -86px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.98);
            color: #0e4c78;
            border: 2px solid #a9d7ef;
            border-radius: 22px;
            padding: 12px 16px;
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.3;
            white-space: normal;
            width: 240px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.16);
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            z-index: 2;
        }
        .burbuja-catfish::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 8px 0 8px;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.98) transparent transparent transparent;
        }
        .burbuja-catfish.mostrar {
            opacity: 1;
        }
        .burbuja-catfish.mostrar.hablando {
            animation: burbujaHabla 0.42s ease;
        }
        @keyframes burbujaHabla {
            from {
                transform: translateX(-50%) translateY(10px) scale(0.96);
            }
            to {
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }
        body {
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 14% 18%, rgba(255,255,255,0.2) 0 10px, transparent 12px),
                radial-gradient(circle at 86% 30%, rgba(255,255,255,0.16) 0 16px, transparent 18px),
                linear-gradient(180deg, rgba(0, 80, 120, 0.16), rgba(0, 40, 80, 0.22));
            pointer-events: none;
        }
        .titulo {
            color: white;
            text-shadow: 0 6px 16px rgba(0, 45, 70, 0.3);
            letter-spacing: 0;
            text-transform: none;
            line-height: 1.05;
        }
        .usuario-info {
            border: 0;
            border-radius: 22px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 12px 24px rgba(0, 45, 70, 0.18);
        }
        .usuario-info img {
            width: 44px;
            height: 44px;
            object-fit: cover;
            border: 3px solid white;
        }
        .boton-musica {
            border-radius: 16px;
            width: 78px;
            height: 78px;
            padding: 6px;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid rgba(255, 255, 255, 0.95);
            box-shadow: 0 8px 0 #c95c27, 0 14px 24px rgba(201, 92, 39, 0.18);
            overflow: hidden;
        }
        .boton-musica img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            pointer-events: none;
        }
        @media (max-width: 900px) {
            body {
                align-items: flex-start;
                padding-top: 92px;
            }
            .pagina-contenedor {
                flex-direction: column-reverse;
                gap: 24px;
            }
            .imagen-catfish {
                min-width: 0;
                width: min(92vw, 320px);
            }
            .catfish-img {
                width: 150px;
                height: 150px;
            }
            .burbuja-catfish {
                top: auto;
                bottom: -70px;
            }
            .burbuja-catfish::after {
                top: -10px;
                bottom: auto;
                border-width: 0 8px 10px 8px;
                border-color: transparent transparent rgba(255, 255, 255, 0.98) transparent;
            }
        }
        @media (max-width: 560px) {
            .contenedor-principal {
                padding: 28px 18px;
                border-radius: 24px;
            }
            .titulo {
                font-size: 2rem;
            }
            .menu-opciones a {
                min-height: 58px;
                padding: 16px;
            }
            .usuario-info {
                left: 12px;
                right: auto;
                max-width: calc(100vw - 24px);
            }
            .boton-musica {
                bottom: 12px;
                left: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="usuario-info" class="usuario-info">
        <img id="avatarUsuario" src="" alt="Avatar">
        <span id="nombreUsuario"></span>
    </div>
    <div class="pagina-contenedor">
        <div class="contenedor-principal">
            <h1 class="titulo">Elige tu lección</h1>
            <div class="menu-opciones">
                <a href="contar.html" class="leccion-btn" data-leccion="contar">Aprende a contar</a>
                <a href="sumar.html" class="leccion-btn" data-leccion="sumar">Aprende a sumar</a>
                <a href="restar.html" class="leccion-btn" data-leccion="restar">Aprende a restar</a>
                <a href="juego1.html" class="leccion-btn" data-leccion="juego">Juego</a>
            </div>
        </div>
        <div class="imagen-catfish">
            <img id="catfish" src="img/Catfish.webp" alt="Catfish" class="catfish-img" role="button" tabindex="0">
            <div id="burbuja-catfish" class="burbuja-catfish">Empecemos con tu primera lección: aprendamos a contar números.</div>
        </div>
    </div>

    <!-- Música de fondo -->
    <audio id="musica-fondo" src="sonidos/musica2.mp3" loop preload="auto"></audio>
    <button id="boton-musica" class="boton-musica" type="button" aria-label="Activar musica">
        <img src="img/Mart.gif" alt="">
    </button>

    <script>
        let musicaFondo;
        let musicaActiva = false;

        function configurarMusica() {
            musicaFondo = document.getElementById('musica-fondo');
            const btnMusica = document.getElementById('boton-musica');
            if (!musicaFondo || !btnMusica) {
                return;
            }

            btnMusica.addEventListener('click', function() {
                if (musicaActiva) {
                    musicaFondo.pause();
                    musicaActiva = false;
                    btnMusica.setAttribute('aria-label', 'Activar musica');
                    return;
                }

                musicaFondo.play().then(() => {
                    musicaActiva = true;
                    btnMusica.setAttribute('aria-label', 'Pausar musica');
                }).catch(() => {});
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Cargar info del usuario
            const nombre = localStorage.getItem('nombreUsuario');
            const avatar = localStorage.getItem('avatarSeleccionado');
            
            if (nombre && avatar) {
                const avatarMap = {
                    avatar1: 'alce.png',
                    avatar2: 'leon.png',
                    avatar3: 'rana.png',
                    avatar4: 'tigre.png'
                };
                
                document.getElementById('avatarUsuario').src = 'img/' + avatarMap[avatar];
                document.getElementById('nombreUsuario').textContent = nombre;
                console.log('Usuario cargado:', nombre, avatar);
            } else {
                console.log('No hay datos de usuario');
            }
            
            // Pez asistente con voz y frases de apoyo
            const catfish = document.getElementById('catfish');
            const burbujaCatfish = document.getElementById('burbuja-catfish');
            const lineasCatfish = [
                'Hoy podemos practicar contar. Mira bien cada número y dilo con calma.',
                'Cuando termines de contar, podremos sumar peces. Sumar es juntar cantidades.',
                'Después de sumar, aprenderemos a restar. Restar es quitar una parte.',
                'Si una lección está bloqueada, completa la anterior y vuelve a mirar.',
                'En el juego tendrás que pensar rápido y pescar la respuesta correcta.',
                'No hay apuro. Aprender matemáticas funciona mejor paso a paso.',
                'Si te equivocas, vuelve a intentarlo. Cada intento te entrena un poquito más.',
                'Primero cuenta, luego suma, después resta. Ese orden nos ayuda mucho.'
            ];
            let ultimaInteraccionCatfish = Date.now();
            let timeoutBurbujaCatfish = null;

            function obtenerLineaCatfish() {
                return lineasCatfish[Math.floor(Math.random() * lineasCatfish.length)];
            }

            function hablarCatfish(texto) {
                if (!catfish || !burbujaCatfish) {
                    return;
                }

                ultimaInteraccionCatfish = Date.now();
                burbujaCatfish.textContent = texto;
                burbujaCatfish.classList.add('mostrar', 'hablando');
                catfish.classList.add('hablando');

                clearTimeout(timeoutBurbujaCatfish);
                timeoutBurbujaCatfish = setTimeout(() => {
                    burbujaCatfish.classList.remove('mostrar', 'hablando');
                    catfish.classList.remove('hablando');
                }, 5200);

                if (typeof speechSynthesis !== 'undefined') {
                    speechSynthesis.cancel();
                    const voz = new SpeechSynthesisUtterance(texto);
                    voz.lang = 'es-ES';
                    voz.rate = 0.94;
                    voz.pitch = 1;
                    voz.volume = 1;
                    voz.onend = () => {
                        catfish.classList.remove('hablando');
                    };
                    voz.onerror = () => {
                        catfish.classList.remove('hablando');
                    };
                    speechSynthesis.speak(voz);
                }
            }

            if (catfish && burbujaCatfish) {
                catfish.addEventListener('click', () => {
                    hablarCatfish(obtenerLineaCatfish());
                });

                catfish.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        hablarCatfish(obtenerLineaCatfish());
                    }
                });

                setInterval(() => {
                    const pasaronCincoSegundos = Date.now() - ultimaInteraccionCatfish >= 5000;

                    if (
                        pasaronCincoSegundos &&
                        document.visibilityState === 'visible' &&
                        Math.random() < 0.1
                    ) {
                        hablarCatfish(obtenerLineaCatfish());
                    }
                }, 5000);
            }
            
            // Configurar bloqueos de lecciones
            const leccionesOrden = ['contar', 'sumar', 'restar', 'juego'];
            const botonesLecciones = document.querySelectorAll('.leccion-btn');
            
            botonesLecciones.forEach((btn, index) => {
                const leccion = btn.getAttribute('data-leccion');
                
                // Primera lección siempre disponible
                if (index === 0) {
                    btn.classList.remove('bloqueado');
                    return;
                }
                
                // Verificar si la lección anterior está completada
                const leccionAnterior = leccionesOrden[index - 1];
                const completada = localStorage.getItem(`leccion_${leccionAnterior}_completada`) === 'true';
                
                if (completada) {
                    btn.classList.remove('bloqueado');
                } else {
                    btn.classList.add('bloqueado');
                    btn.innerHTML = '<span class="candado">🔒</span>' + btn.textContent;
                    btn.href = 'javascript:void(0);';
                }
            });
            configurarMusica();
        });
    </script>
</body>
</html>
