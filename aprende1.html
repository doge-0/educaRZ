<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Aprende</title>
    <link rel="stylesheet" href="css/interfaz.css">
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        .menu-opciones {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .menu-opciones a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px 20px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }
        .menu-opciones a:hover:not(.bloqueado) {
            transform: translateY(-3px);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.24);
        }
        .menu-opciones a.bloqueado {
            background: linear-gradient(135deg, #999 0%, #666 100%);
            cursor: not-allowed;
            opacity: 0.6;
            pointer-events: none;
        }
        .candado {
            font-size: 1.2em;
        }
        .pagina-contenedor {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
            max-width: 1100px;
        }
        .imagen-catfish {
            position: absolute;
            left: -170px;
            top: 35%;
            transform: translateY(-35%);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-width: 220px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid rgba(24, 141, 211, 0.35);
            border-radius: 28px;
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.18);
        }
        .contenedor-principal {
            max-width: 500px;
            width: 100%;
        }
        .catfish-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            cursor: pointer;
            animation: nadar 3s ease-in-out infinite;
        }
        @keyframes nadar {
            0%, 100% {
                transform: scale(1) translateX(0);
            }
            50% {
                transform: scale(1.1) translateX(10px);
            }
        }
        .burbuja-catfish {
            position: absolute;
            top: -90px;
            left: 100%;
            transform: translateX(10px);
            background: rgba(255, 255, 255, 0.98);
            color: #0e4c78;
            border: 2px solid #a9d7ef;
            border-radius: 22px;
            padding: 12px 16px;
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.3;
            white-space: normal;
            max-width: 240px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.16);
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            z-index: 2;
        }
        .burbuja-catfish::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: -8px;
            transform: translateX(0);
            border-width: 8px 8px 8px 0;
            border-style: solid;
            border-color: transparent rgba(255, 255, 255, 0.98) transparent transparent;
        }
        .burbuja-catfish.mostrar {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="usuario-info" class="usuario-info">
        <img id="avatarUsuario" src="" alt="Avatar">
        <span id="nombreUsuario"></span>
    </div>
    <div class="pagina-contenedor">
        <div class="contenedor-principal">
            <h1 class="titulo">Elige tu lección</h1>
            <div class="menu-opciones">
                <a href="contar.html" class="leccion-btn" data-leccion="contar">Aprende a como contar</a>
                <a href="sumar.html" class="leccion-btn" data-leccion="sumar">Aprende a como sumar</a>
                <a href="restar.html" class="leccion-btn" data-leccion="restar">Aprende como restar</a>
                <a href="juego1.html" class="leccion-btn" data-leccion="juego">Juego</a>
            </div>
        </div>
        <div class="imagen-catfish">
            <img id="catfish" src="img/Catfish.webp" alt="Catfish" class="catfish-img">
            <div id="burbuja-catfish" class="burbuja-catfish">Empezemos con tu primera leccion, aprendamos a contar numeros</div>
        </div>
    </div>

    <!-- Música de fondo -->
    <div id="player"></div>
    <button id="boton-musica" class="boton-musica">Música ON</button>

    <script>
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: '3KDxilHdq0M',
                playerVars: {
                    autoplay: 1,
                    mute: 1,
                    loop: 1,
                    playlist: '3KDxilHdq0M'
                },
                events: {
                    onReady: onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.unMute();
            event.target.playVideo();
            const btn = document.getElementById('boton-musica');
            if (btn) {
                btn.textContent = 'Música ON';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Cargar info del usuario
            const nombre = localStorage.getItem('nombreUsuario');
            const avatar = localStorage.getItem('avatarSeleccionado');
            
            if (nombre && avatar) {
                const avatarMap = {
                    avatar1: 'alce.png',
                    avatar2: 'leon.png',
                    avatar3: 'rana.png',
                    avatar4: 'tigre.png'
                };
                
                document.getElementById('avatarUsuario').src = 'img/' + avatarMap[avatar];
                document.getElementById('nombreUsuario').textContent = nombre;
                console.log('Usuario cargado:', nombre, avatar);
            } else {
                console.log('No hay datos de usuario');
            }
            
            // Event listener para la imagen del catfish
            const catfish = document.getElementById('catfish');
            const burbujaCatfish = document.getElementById('burbuja-catfish');
            if (catfish && burbujaCatfish) {
                catfish.addEventListener('click', () => {
                    burbujaCatfish.classList.add('mostrar');
                    setTimeout(() => {
                        burbujaCatfish.classList.remove('mostrar');
                    }, 3000); // Mostrar por 3 segundos
                });
            }
            
            // Configurar bloqueos de lecciones
            const leccionesOrden = ['contar', 'sumar', 'restar', 'juego'];
            const botonesLecciones = document.querySelectorAll('.leccion-btn');
            
            botonesLecciones.forEach((btn, index) => {
                const leccion = btn.getAttribute('data-leccion');
                
                // Primera lección siempre disponible
                if (index === 0) {
                    btn.classList.remove('bloqueado');
                    return;
                }
                
                // Verificar si la lección anterior está completada
                const leccionAnterior = leccionesOrden[index - 1];
                const completada = localStorage.getItem(`leccion_${leccionAnterior}_completada`) === 'true';
                
                if (completada) {
                    btn.classList.remove('bloqueado');
                } else {
                    btn.classList.add('bloqueado');
                    btn.innerHTML = '<span class="candado">🔒</span>' + btn.textContent;
                    btn.href = 'javascript:void(0);';
                }
            });
            
            const btnMusica = document.getElementById('boton-musica');
            if (btnMusica) {
                btnMusica.addEventListener('click', function() {
                    if (!player) {
                        return;
                    }
                    if (player.getPlayerState() === YT.PlayerState.PLAYING) {
                        player.pauseVideo();
                        btnMusica.textContent = 'Música OFF';
                    } else {
                        player.unMute();
                        player.playVideo();
                        btnMusica.textContent = 'Música ON';
                    }
                });
            }
        });
    </script>
</body>
</html>
