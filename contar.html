<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprende a contar</title>
    <link rel="stylesheet" href="css/contar.css">
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div id="usuario-info" class="usuario-info">
        <img id="avatarUsuario" src="" alt="Avatar">
        <span id="nombreUsuario"></span>
    </div>
    <div class="contenedor-leccion">
        <h1>Aprende a contar del 0 al 10</h1>
        <div class="asistente-pececito">
            <img id="pez-asistente" src="img/Catfish.webp" alt="Pez asistente">
            <div id="burbuja-pececito" class="burbuja-pececito">¡Hola! Presiona algunos números para aprender a contar.</div>
        </div>
        <div class="numeros">
            <button class="numero" data-num="0">0</button>
            <button class="numero" data-num="1">1</button>
            <button class="numero" data-num="2">2</button>
            <button class="numero" data-num="3">3</button>
            <button class="numero" data-num="4">4</button>
            <button class="numero" data-num="5">5</button>
            <button class="numero" data-num="6">6</button>
            <button class="numero" data-num="7">7</button>
            <button class="numero" data-num="8">8</button>
            <button class="numero" data-num="9">9</button>
            <button class="numero" data-num="10">10</button>
        </div>
        <div id="imagenes-container" class="imagenes-container"></div>
        <button id="btn-iniciar-desafio" class="btn-iniciar-desafio oculto">Iniciar Desafío</button>
        <div id="desafio-contador" class="desafio-contador oculto">
            <p class="texto-desafio">Desafío: escribe el nombre en español del número que aparece aquí:</p>
            <div id="numero-random" class="numero-random">?</div>
            <input id="respuesta-numero" type="text" placeholder="Escribe el nombre del número">
            <button id="enviar-respuesta" class="btn-verificar">Verificar</button>
            <div id="feedback" class="feedback"></div>
            <div class="botones-desafio">
                <button id="btn-volver" class="btn-volver">Volver</button>
                <button id="btn-siguiente" class="btn-siguiente bloqueado" disabled>Siguiente 🔒</button>
            </div>
        </div>
        <button id="completar-leccion" class="btn-completar oculto">Completar lección y volver</button>
    </div>
    
    <!-- Contenedor de confeti -->
    <div id="contenedor-confeti" class="contenedor-confeti"></div>
    
    <!-- Música de fondo -->
    <div id="player"></div>
    
    <!-- Botón de música -->
    <button id="boton-musica" class="boton-musica">Música ON</button>
    
    <script src="js/contar.js"></script>
</body>
</html>
