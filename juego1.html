<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Pesca Matemática</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/juego1.css" />
</head>

<body>

<div class="game" id="game">

  <div class="topbar">

    <div class="card">
      🎣 Capturados:
      <span id="caught">0</span>
    </div>

    <div class="card">
      ⭐ Puntaje:
      <span id="score">0</span>
    </div>

    <div class="card">
      🔥 Racha:
      <span id="streak">0</span>
    </div>

    <div class="card">
      ⏰ Tiempo:
      <span id="timer">--</span>
    </div>

  </div>

  <div class="equation" id="equation">
    2 + 2
  </div>

  <div class="message" id="message">
    ¡Excelente!
  </div>

  <div class="bottom-ui">

    <button class="easy" onclick="setDifficulty('easy')">
      🟢 Fácil
    </button>

    <button class="medium" onclick="setDifficulty('medium')">
      🟡 Normal
    </button>

    <button class="hard" onclick="setDifficulty('hard')">
      🔴 Difícil
    </button>

    <button class="verify" id="verifyBtn" onclick="verifyAnswer()">
      ✅ Verificar
    </button>

  </div>

</div>
<script src="js/juego1.js"></script>
</body>
</html>
