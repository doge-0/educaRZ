<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Pesca Matemática</title>

<link rel="icon" type="image/webp" href="img/null.webp">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/juego1.css" />
</head>

<body>

<div class="game" id="game">
  <div id="usuario-info" class="usuario-info">
    <img id="avatarUsuario" alt="Avatar">
    <span id="nombreUsuario"></span>
  </div>

  <button class="music-btn" id="musicBtn">
    <img src="img/Mart.gif" alt="Música">
  </button>

  <div class="sea-light sea-light-one"></div>
  <div class="sea-light sea-light-two"></div>
  <div class="sand"></div>
  <div class="seaweed seaweed-one"></div>
  <div class="seaweed seaweed-two"></div>
  <div class="seaweed seaweed-three"></div>
  <div class="coral coral-one"></div>
  <div class="coral coral-two"></div>
  <div class="kelp kelp-one"></div>
  <div class="kelp kelp-two"></div>
  <div class="fish-shadow shadow-one"></div>
  <div class="fish-shadow shadow-two"></div>
  <div class="fish-shadow shadow-three"></div>

  <section class="difficulty-menu" id="difficultyMenu">
    <div class="difficulty-panel">
      <h1>Elige una dificultad</h1>
      <div class="difficulty-options">
        <button class="easy difficulty-btn" data-level="easy">Modo fácil</button>
        <button class="medium difficulty-btn" data-level="medium">Normal</button>
        <button class="hard difficulty-btn" data-level="hard">Difícil</button>
        <button class="infinite difficulty-btn" data-level="infinite">Infinito</button>
      </div>
      <p class="unlock-hint" id="unlockHint">Completa una dificultad para desbloquear la siguiente.</p>
      <button class="back menu-back" id="menuBackBtn">Volver</button>
    </div>
  </section>

  <div class="topbar">

    <div class="card captured-card">
      🎣 Capturados:
      <span id="caught">0</span>
    </div>

    <div class="card score-card">
      ⭐ Puntaje:
      <span id="score">0</span>
    </div>

    <div class="card streak-card">
      🔥 Racha:
      <span id="streak">0</span>
    </div>

    <div class="card lives-card">
      💙 Vidas:
      <span id="lives">3</span>
    </div>

    <div class="card">
      ⏰ Tiempo:
      <span id="timer">--</span>
    </div>

  </div>

  <div class="challenge-panel">
    <div class="challenge-label">Resuelve y pesca esa cantidad</div>
    <div class="equation" id="equation">
      2 + 2
    </div>
    <div class="round-hint" id="roundHint">Arrastra los peces a la pecera.</div>
  </div>

  <div class="aquarium" id="aquarium" aria-label="Pecera para dejar los peces">
    <div class="aquarium-water"></div>
    <div class="aquarium-label">Pecera</div>
  </div>

  <div class="message" id="message">
    ¡Excelente!
  </div>

  <div class="bottom-ui">

    <button class="release" id="releaseBtn">
      ↩ Soltar 1
    </button>

    <button class="verify" id="verifyBtn">
      ✅ Verificar
    </button>

    <button class="next-round" id="newRoundBtn">
      🔄 Nueva ronda
    </button>

    <button class="back" id="backBtn">
      Volver
    </button>

  </div>

</div>

<div class="complete-overlay" id="completeOverlay">
  <div class="complete-card">
    <img src="img/pezgirando.gif" alt="">
    <h2>¡Lección completada!</h2>
    <p>Respondiste correctamente las 3 preguntas.</p>
  </div>
</div>

<audio id="gameMusic" loop>
  <source src="sonidos/Ippo.mp3" type="audio/mpeg">
</audio>

<script src="js/juego1.js"></script>
</body>
</html>
